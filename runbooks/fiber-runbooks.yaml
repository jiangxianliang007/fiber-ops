version: 1

metadata:
  project: fiber-ops
  description: Minimal Fiber alert runbook configuration for n8n/AI diagnostics

ids_schema:
  channel_id: "Fiber channel id (Hash256)"
  peer_pubkey: "Peer public key"
  payment_hash: "Payment hash"
  tx_hash: "CKB transaction hash"
  outpoint: "CKB outpoint"
  tlc_id: "TLC id"

capabilities:
  lookup_channel:
    description: Query channel details when channel_id is available
    rpc: list_channels
    requires_any:
      - ids.channel_id

  lookup_peer:
    description: Query peer details when peer_pubkey is available
    rpc: list_peers
    requires_any:
      - ids.peer_pubkey

  lookup_payment:
    description: Query payment session details when payment_hash is available
    rpc: get_payment
    requires_any:
      - ids.payment_hash

  lookup_transaction:
    description: Query transaction details when tx_hash is available
    rpc: get_transaction
    requires_any:
      - ids.tx_hash

  lookup_outpoint:
    description: Query a live cell when outpoint is available
    rpc: get_live_cell
    requires_any:
      - ids.outpoint

  search_recent_logs:
    description: Search recent logs in observability backend
    rpc: search_logs
    requires_any:
      - component
      - error_type

runbooks:
  - error_type: TlcAmountExceedLimit
    category: liquidity
    severity: warning
    fingerprint_fields:
      - error_type
      - ids.channel_id
    dedup_window_minutes: 5
    recheck_window_minutes: 20
    preferred_capabilities:
      - lookup_channel
      - lookup_peer
      - search_recent_logs
    report_title: "TLC amount exceeds channel limit"
    summary: "The requested TLC amount exceeds the channel's currently sendable outbound liquidity."
    fallback_summary: "Insufficient context for live checks; likely outbound liquidity exhaustion based on error type alone."

  - error_type: ChannelNotFound
    category: channel-state
    severity: warning
    fingerprint_fields:
      - error_type
      - ids.channel_id
    dedup_window_minutes: 5
    recheck_window_minutes: 30
    preferred_capabilities:
      - lookup_channel
      - lookup_peer
      - search_recent_logs
    report_title: "Channel not found"
    summary: "A channel-related operation referenced a channel actor/state that could not be found."
    fallback_summary: "Insufficient context for live checks; likely closed, not restored, or inconsistent channel state."

  - error_type: TransactionFailedToResolve
    category: chain-rpc
    severity: error
    fingerprint_fields:
      - error_type
      - ids.tx_hash
      - ids.outpoint
    dedup_window_minutes: 10
    recheck_window_minutes: 30
    preferred_capabilities:
      - lookup_transaction
      - lookup_outpoint
      - search_recent_logs
    report_title: "Transaction failed to resolve"
    summary: "CKB node could not resolve one or more transaction dependencies or inputs."
    fallback_summary: "Insufficient context for live checks; likely missing, spent, or not-yet-visible input/dependency."
